<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mathematics Hub - BrainHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #eef3f8;
            --panel: rgba(251, 253, 255, 0.85);
            --panel-solid: #fbfdff;
            --panel-2: #f5f8fb;
            --text: #17202a;
            --muted: #657282;
            --line: rgba(26, 42, 58, 0.08);
            --primary: #2563eb;
            --primary-light: rgba(37, 99, 235, 0.08);
            --shadow: 0 20px 40px rgba(31, 45, 61, 0.06);
            --soft: 0 8px 20px rgba(31, 45, 61, 0.04);
            --radius: 20px;
            --radius-sm: 14px;
            --nav-h: 72px;
        }

        [data-theme="dark"] {
            --bg: #121722;
            --panel: rgba(26, 34, 48, 0.85);
            --panel-solid: #1a2230;
            --panel-2: #111827;
            --text: #edf2f7;
            --muted: #9aa8ba;
            --line: rgba(255, 255, 255, 0.06);
            --primary: #60a5fa;
            --primary-light: rgba(96, 165, 250, 0.12);
            --shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
            --soft: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 40px;
            overflow-x: hidden;
        }

        /* Ambient Animated Background Backgrounds */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 5% 10%, rgba(37, 99, 235, 0.05), transparent 400px),
                radial-gradient(circle at 95% 80%, rgba(96, 165, 250, 0.05), transparent 500px);
            z-index: -1;
        }

        /* Nav Layout Structural Sync */
        nav {
            height: var(--nav-h);
            background: var(--panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            padding: 0 max(20px, 4vw);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-link {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--panel-2);
            border: 1px solid var(--line);
            color: var(--text);
            display: grid;
            place-items: center;
            text-decoration: none;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            background: var(--line);
            transform: translateX(-2px);
        }

        .nav-left h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.4px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Navigation Filter Controller Tabs */
        .tabs-wrapper {
            position: sticky;
            top: var(--nav-h);
            z-index: 90;
            padding: 14px 0;
            background: color-mix(in srgb, var(--bg) 92%, transparent);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .tabs-container {
            display: flex;
            gap: 8px;
            background: var(--panel-solid);
            padding: 6px;
            border-radius: var(--radius);
            box-shadow: var(--soft);
            border: 1px solid var(--line);
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs-container::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex: 1;
            min-width: 90px;
            background: none;
            border: none;
            padding: 12px 16px;
            color: var(--muted);
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            white-space: nowrap;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn.active {
            background-color: var(--primary);
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
        }

        /* Core Dual Column Framework Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 10px;
            align-items: start;
        }

        @media (min-width: 900px) {
            .grid {
                grid-template-columns: 480px 1fr;
                gap: 24px;
            }
        }

        .panel {
            background: var(--panel-solid);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
        }

        .panel-head {
            margin-bottom: 20px;
        }

        .panel-title h3 {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .panel-title p {
            color: var(--muted);
            font-size: 13px;
            margin-top: 4px;
        }

        /* Premium Premium Structural Chapter Click Nodes */
        .chapter-card-item {
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            background: var(--panel-2);
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chapter-card-item:active {
            transform: scale(0.98);
        }

        .chapter-info-box {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chapter-index {
            width: 44px;
            height: 44px;
            background: var(--panel-solid);
            border: 1px solid var(--line);
            border-radius: 12px;
            display: grid;
            place-items: center;
            font-weight: 800;
            font-size: 15px;
            color: var(--primary);
            box-shadow: var(--soft);
            transition: all 0.2s;
        }

        .chapter-titles h4 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.4;
        }

        .chapter-titles p {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
        }

        .action-arrow {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--panel-solid);
            border: 1px solid var(--line);
            color: var(--primary);
            display: grid;
            place-items: center;
            font-size: 12px;
            box-shadow: var(--soft);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Active Chapter Highlight & Hover Mechanics */
        .chapter-card-item.selected-active {
            background: var(--primary-light);
            border-color: var(--primary);
        }

        .chapter-card-item.selected-active .chapter-index {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .chapter-card-item.selected-active .action-arrow {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            transform: rotate(-45deg);
        }

        @media (min-width: 900px) {
            .chapter-card-item:hover:not(.selected-active) {
                background: var(--panel-solid);
                transform: translateY(-2px);
                box-shadow: var(--soft);
                border-color: var(--muted);
            }

            .chapter-card-item:hover:not(.selected-active) .action-arrow {
                transform: translateX(3px);
            }
        }

        /* Right Side Split Screen Workspace (UX Core) */
        .desktop-pane-view {
            position: sticky;
            top: calc(var(--nav-h) + 24px);
            min-height: 480px;
            display: none;
            transition: all 0.3s ease;
        }

        @media (min-width: 900px) {
            .desktop-pane-view {
                display: block;
            }
        }

        .placeholder-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            min-height: 400px;
        }

        .placeholder-box i {
            font-size: 36px;
            color: var(--primary);
            background: var(--primary-light);
            width: 80px;
            height: 80px;
            display: grid;
            place-items: center;
            border-radius: 24px;
            margin-bottom: 20px;
        }

        .placeholder-box h4 {
            color: var(--text);
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .placeholder-box p {
            font-size: 14px;
            max-width: 300px;
            line-height: 1.5;
        }

        /* Premium Dashboard Preview Hub UI */
        .preview-workspace {
            animation: paneFadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .preview-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            border-bottom: 1px solid var(--line);
            padding-bottom: 18px;
            margin-bottom: 20px;
        }

        .preview-header-meta h2 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .preview-badge {
            display: inline-block;
            padding: 4px 10px;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
            border-radius: 8px;
            margin-top: 6px;
        }

        .preview-body-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        .preview-stat-card {
            background: var(--panel-2);
            border: 1px solid var(--line);
            padding: 16px;
            border-radius: var(--radius-sm);
        }

        .preview-stat-card i {
            color: var(--primary);
            font-size: 16px;
            margin-bottom: 8px;
        }

        .preview-stat-card h5 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }

        .preview-stat-card p {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
        }

        /* Large Action Launch Button */
        .launch-hub-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
        }

        .launch-hub-btn:hover {
            opacity: 0.95;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(37, 99, 235, 0.3);
        }

        @keyframes paneFadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Text selection disable */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;

            -webkit-touch-callout: none;
        }

        /* Mobile tap highlight remove */
        * {
            -webkit-tap-highlight-color: transparent;
        }

        /* Images drag disable */
        img {
            -webkit-user-drag: none;
            /* 'user-drag' is non-standard and removed to avoid unknown-property errors */
            pointer-events: none;
        }
    </style>
</head>

<body>

    <nav>
        <div class="nav-left">
            <a href="../../index.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1>Mathematics Hub</h1>
        </div>
    </nav>

    <div class="container">

        <div class="tabs-wrapper">
            <div class="tabs-container">
                <button class="tab-btn active" onclick="filterClassSelection(9, this)">Class 9</button>
                <button class="tab-btn" onclick="filterClassSelection(10, this)">Class 10</button>
                <button class="tab-btn" onclick="filterClassSelection(11, this)">Class 11</button>
                <button class="tab-btn" onclick="filterClassSelection(12, this)">Class 12</button>
            </div>
        </div>

        <div class="grid">
            <!-- Left Panel (Chapter Selector Master Side) -->
            <div class="panel">
                <div class="panel-head">
                    <div class="panel-title">
                        <h3 id="panelClassTitle">Class 9 Chapters</h3>
                        <p>Click on any module to open or view asset insights</p>
                    </div>
                </div>
                <div style="display:flex; flex-direction:column;" id="chaptersContainerList">
                    <!-- Dynamic Generation Inject Node -->
                </div>
            </div>

            <!-- Right Panel (Interactive Split Desk Pane Workspace) -->
            <div class="panel desktop-pane-view" id="desktopInteractivePane">
                <div class="placeholder-box">
                    <i class="fa-solid fa-layer-group"></i>
                    <h4>Interactive Studio</h4>
                    <p>Select any structural chapter framework profile from the menu list matrix to reveal dynamic
                        modules layout control tools.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORE_KEY = "brainhub.app.v2";

        function applySavedTheme() {
            try {
                const state = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
                document.documentElement.dataset.theme = state.theme || "light";
            } catch (err) {
                document.documentElement.dataset.theme = "light";
            }
        }

        // Object Array Architecture with Explicit target parameter properties 
        const chaptersDatabase = [
            // --- CLASS 9 ---
            { class: 9, ch: 1, title: "Number Systems", desc: "Real numbers & rational decimal representation", url: "chapters/class9/number-systems.html" },
            { class: 9, ch: 2, title: "Polynomials", desc: "Algebraic expressions, variables & degrees", url: "chapters/class9/polynomials.html" },
            { class: 9, ch: 3, title: "Coordinate Geometry", desc: "Cartesian plane matrix, quadrants mapping", url: "chapters/class9/coordinate-geometry.html" },
            { class: 9, ch: 4, title: "Linear Equations", desc: "Two variable linear expressions & graphs", url: "chapters/class9/linear-equations.html" },

            // --- CLASS 10 ---
            { class: 10, ch: 1, title: "Real Numbers", desc: "Fundamental Theorem of Arithmetic & HCF/LCM", url: "chapters/class10/real-numbers.html" },
            { class: 10, ch: 2, title: "Polynomials", desc: "Zeros relationship and coefficient vectors", url: "chapters/class10/polynomials.html" },
            { class: 10, ch: 3, title: "Trigonometry Basics", desc: "Right angled ratios and identity matrices", url: "chapters/class10/trigonometry.html" },

            // --- CLASS 11 ---
            { class: 11, ch: 1, title: "Sets and Functions", desc: "Venn layouts, intersections & subsets", url: "chapters/class11/sets-functions.html" },
            { class: 11, ch: 2, title: "Limits & Derivatives", desc: "Calculus foundations and instant slopes", url: "chapters/class11/limits-derivatives.html" },

            // --- CLASS 12 ---
            { class: 12, ch: 1, title: "Matrices", desc: "Grid arrays, transposition & scalar multiplication", url: "chapters/class12/matrices.html" },
            { class: 12, ch: 2, title: "Integrals Calculus", desc: "Definite integration bounds & antiderivatives", url: "chapters/class12/integrals.html" }
        ];

        let selectedActiveClass = 9;
        const listContainer = document.getElementById("chaptersContainerList");
        const rightPane = document.getElementById("desktopInteractivePane");

        // UI Core Dynamic List Generation Engine
        function renderChapters() {
            listContainer.innerHTML = "";
            document.getElementById("panelClassTitle").textContent = `Class ${selectedActiveClass} Chapters`;

            const filteredChapters = chaptersDatabase.filter(item => item.class === selectedActiveClass);

            if (filteredChapters.length === 0) {
                listContainer.innerHTML = "<div class='placeholder-box'><p>No modules listed inside this class framework selection.</p></div>";
                return;
            }

            filteredChapters.forEach((chapter) => {
                const card = document.createElement("div");
                card.className = "chapter-card-item";
                card.id = `card-node-${chapter.class}-${chapter.ch}`;

                // UX Trigger Context Action Execution Routing
                card.onclick = () => handleRowSelectionTrigger(chapter);

                card.innerHTML = `
                    <div class="chapter-info-box">
                        <div class="chapter-index">${chapter.ch}</div>
                        <div class="chapter-titles">
                            <h4>${chapter.title}</h4>
                            <p>${chapter.desc}</p>
                        </div>
                    </div>
                    <div class="action-arrow">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                `;

                listContainer.appendChild(card);
            });

            // Smart UX Rule: Auto load first card inside Desktop Workspace View context on initialization
            if (window.innerWidth >= 900 && filteredChapters.length > 0) {
                handleRowSelectionTrigger(filteredChapters[0]);
            } else {
                resetWorkspacePlaceholder();
            }
        }

        // Route & Selection Orchestration Logic Module
        function handleRowSelectionTrigger(chapterObj) {
            const isDesktop = window.innerWidth >= 900;

            if (isDesktop) {
                // Remove existing focus highlights
                document.querySelectorAll(".chapter-card-item").forEach(el => el.classList.remove("selected-active"));

                // Add current focus state
                const selectedNode = document.getElementById(`card-node-${chapterObj.class}-${chapterObj.ch}`);
                if (selectedNode) selectedNode.classList.add("selected-active");

                // Render dynamic Desktop Interaction Studio UI Layout Dashboard
                rightPane.innerHTML = `
                    <div class="preview-workspace">
                        <div class="preview-header">
                            <div class="preview-header-meta">
                                <h2>${chapterObj.title}</h2>
                                <span class="preview-badge">Class ${chapterObj.class} • Chapter ${chapterObj.ch}</span>
                            </div>
                            <i class="fa-solid fa-compass" style="font-size: 24px; color: var(--primary);"></i>
                        </div>

                        <div style="font-size:14px; color:var(--muted); margin-bottom:20px; line-height:1.6;">
                            ${chapterObj.desc}. Access full formulas, assignments, competitive tracking dashboards, and previous question matrices.
                        </div>

                        <div class="preview-body-grid">
                            <div class="preview-stat-card">
                                <i class="fa-solid fa-file-lines"></i>
                                <h5>Revision Sheets</h5>
                                <p>Core definitions summaries</p>
                            </div>
                            <div class="preview-stat-card">
                                <i class="fa-solid fa-calculator"></i>
                                <h5>Formula Bank</h5>
                                <p>Quick reference equations</p>
                            </div>
                            <div class="preview-stat-card">
                                <i class="fa-solid fa-circle-check"></i>
                                <h5>Practice Sets</h5>
                                <p>Classwork questions & exercises</p>
                            </div>
                            <div class="preview-stat-card">
                                <i class="fa-solid fa-bolt"></i>
                                <h5>Advanced Track</h5>
                                <p>JEE competitive challenges</p>
                            </div>
                        </div>

                        <a href="${chapterObj.url}" class="launch-hub-btn">
                            <span>Open Learning Dashboard</span>
                            <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:13px;"></i>
                        </a>
                    </div>
                `;
            } else {
                // Mobile View Standard Action Route
                window.location.href = chapterObj.url;
            }
        }

        function resetWorkspacePlaceholder() {
            rightPane.innerHTML = `
                <div class="placeholder-box">
                    <i class="fa-solid fa-layer-group"></i>
                    <h4>Interactive Studio</h4>
                    <p>Select any structural chapter framework profile from the menu list matrix to reveal dynamic modules layout control tools.</p>
                </div>
            `;
        }

        function filterClassSelection(classNumberValue, tabButtonReference) {
            selectedActiveClass = classNumberValue;

            document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
            tabButtonReference.classList.add("active");

            renderChapters();
        }

        // Global Layout Resize Security Sync Guard
        window.addEventListener('resize', () => {
            const isDesktop = window.innerWidth >= 900;
            const hasActiveSelection = document.querySelector(".chapter-card-item.selected-active");

            if (isDesktop && !hasActiveSelection) {
                const filtered = chaptersDatabase.filter(item => item.class === selectedActiveClass);
                if (filtered.length > 0) handleRowSelectionTrigger(filtered[0]);
            }
        });

        document.addEventListener("DOMContentLoaded", () => {
            applySavedTheme();
            renderChapters();
        });
    </script>
</body>

</html>
